vars:
  dim: 16

compute_config:
  plan_ngpus: 1
  runtime_ngpus: 1
  constant_folding: true
  use_zero: true
  use_end2end: true
  zero_param_level_sharding: true

run_mode: run
pas_policy: dp
micro_batch_size: 2
global_batch_size: 2
max_train_steps: 2
seed: 0
precision: bf16
enable_progress_bar: false

model:
  type: tests.cli.test_trainer_dion_muon.DionMuonTestModel
  args:
    dim: $(vars.dim)
    nlayers: 4

optimizer:
  type: nnscaler.runtime.dion_muon_optimizer.MixedPrecisionDionMuon
  args:
    lr: 0.01
    use_triton: false
    use_polar_express: false

dataset:
  type: tests.cli.test_trainer_dion_muon.DionMuonTestDataset
  train_args:
    dim: $(vars.dim)
    size: 16
  val_args:
    dim: $(vars.dim)
    size: 8

dataloader:
  train_args:
    drop_last: true
  val_args:
    drop_last: true

checkpoint:
  keep_last_n_checkpoints: 4
  every_n_train_steps: 1
  save_type: deduped
