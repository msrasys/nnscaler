compute_config:
  plan_ngpus: 2
  runtime_ngpus: 2
  constant_folding: true
  use_zero: true
  use_end2end: true
  pas_config:
    pipeline_nmicros: 4
    pipeline_size: 1
    pipeline_scheduler: tests.cli.test_trainer_overlap.sched_overlap

run_mode: run
pas_policy: tests.cli.test_trainer_overlap.toy_policy
micro_batch_size: 4
max_train_steps: 1
seed: 0

model:
  type: tests.cli.test_trainer_overlap.TonyModel

optimizer:
  type: torch.optim.Adam
  args:
    lr: 0.01

dataset:
  type: tests.cli.test_trainer_overlap.OverlapDataset


dataloader:
  train_args:
    drop_last: true
  val_args:
    drop_last: true

checkpoint:
  keep_last_n_checkpoints: 30
  every_n_train_steps: 1
  save_type: deduped
