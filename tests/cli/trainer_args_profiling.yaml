vars:
  dim: 16
  drop_last: true

compute_config:
  plan_ngpus: 1
  runtime_ngpus: 2
  constant_folding: true
  use_zero: true
  use_end2end: true

run_mode: run
pas_policy: dp
micro_batch_size: 2
global_batch_size: 4
max_train_steps: 20
seed: 0
enable_progress_bar: false

model:
  type: tests.cli.common.MLP
  args:
    dim: $(vars.dim)
    nlayers: 16

optimizer:
  type: torch.optim.Adam
  args:
    lr: 0.01

dataset:
  type: tests.cli.common.SimpleDataset
  train_args:
    dim: $(vars.dim)
    size: 100
  val_args:
    dim: $(vars.dim)
    size: 10

dataloader:
  train_args:
    drop_last: $(vars.drop_last)
  val_args:
    drop_last: $(vars.drop_last)

checkpoint:
  no_save: true

debug:
  profile:
    activities:
      - CPU
      - CUDA
    schedule:
      skip_first: 0
      wait: 0
      warmup: 1
      active: 2
    record_shapes: false
    profile_memory: false
    with_stack: false
    trace_handler:
      name: default
      args:
        export_chrome_trace: ./rank{rank}_step{step_num}
